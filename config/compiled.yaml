composition:
  name: KVQueue
systems:
  queue:
    type: BaseQueue
    delivery: exactly_once
    ordering: first_in_first_out
    messaging_model: p2p
    max_size: 100
  kv:
    type: BaseKV
    consistency: strong
    conditional_writes: true
    idempotent_writes: true
    replicas: true
    max_size: 100
