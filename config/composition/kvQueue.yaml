#  --- IGNORE ---
# Currently not used, but if multiple configurations are needed, this can be used to specify which one to use.
composition:
  name: KVQueue
systems:
  queue:
    type: BaseQueue
    delivery: at_least_once
    max_size: 100

  kv:
    type: BaseKV
    consistency: strong
    conditional_writes: true
    idempotent_writes: true
    replicas: false
    max_size: 100